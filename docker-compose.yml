services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      UPTIME_CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - uptime_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uptime_data:
